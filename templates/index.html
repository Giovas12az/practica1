{% extends 'base.html' %}

{% block title %}Inicio{% endblock %}

{% block content %}
<h2>Usuarios</h2>

<ul>
    {% for u in usuarios %}
        <li>
            {{ u.nombre }} ({{ u.email }})
            <a href="{{ url_for('ver_tareas', usuario_id=u._id) }}">Ver tareas</a>
        </li>
    {% endfor %}
</ul>
{% endblock %}
