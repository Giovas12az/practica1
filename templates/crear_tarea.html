{% extends 'base.html' %}

{% block content %}

<div class="container mt-5" style="max-width: 500px;">

    <h2 class="text-center mb-4"> Nueva Tarea</h2>

    <div class="card bg-dark text-white border-secondary shadow">
        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Título</label>
                    <input type="text" name="titulo" class="form-control" placeholder="Ej: Hacer tarea de matemáticas" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Descripción</label>
                    <textarea name="descripcion" class="form-control" rows="3" placeholder="Detalles de la tarea..."></textarea>
                </div>

                <button type="submit" class="btn btn-success w-100">
                     Crear tarea
                </button>

            </form>

        </div>
    </div>

    <div class="text-center mt-3">
        <a href="{{ url_for('ver_tareas', usuario_id=usuario_id) }}" class="btn btn-secondary">
            Volver
        </a>
    </div>

</div>

{% endblock %}
