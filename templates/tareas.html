{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h2 class="text-center mb-4"> Tareas del usuario</h2>

    <div class="d-flex justify-content-end mb-3">
        <a href="{{ url_for('crear_tarea', usuario_id=usuario_id) }}" class="btn btn-success">
            Nueva tarea
        </a>
    </div>

    <div class="list-group">

        {% for t in tareas %}
        <div class="list-group-item mb-3 shadow-sm rounded p-3">

            <div class="d-flex justify-content-between align-items-center">
                <h5 class="mb-1">{{ t.titulo }}</h5>
                <span class="badge bg-primary">{{ t.estado }}</span>
            </div>

            <p class="text-muted mb-2">{{ t.descripcion }}</p>

            <div class="d-flex gap-2 flex-wrap">

                <form method="POST" action="{{ url_for('actualizar_estado', tarea_id=t._id) }}">
                    <div class="input-group">
                        <select name="estado" class="form-select">
                            <option value="pendiente">Pendiente</option>
                            <option value="en_progreso">En progreso</option>
                            <option value="completada">Completada</option>
                            <option value="cancelada">Cancelada</option>
                        </select>
                        <button type="submit" class="btn btn-warning">
                            Actualizar
                        </button>
                    </div>
                </form>


                <form method="POST" action="{{ url_for('eliminar_tarea', tarea_id=t._id) }}">
                    <button type="submit" class="btn btn-danger">
                        Eliminar
                    </button>
                </form>

            </div>

        </div>
        {% endfor %}

    </div>

    <div class="text-center mt-4">
        <a href="{{ url_for('index') }}" class="btn btn-secondary">
            Volver al inicio
        </a>
    </div>

</div>

{% endblock %}
